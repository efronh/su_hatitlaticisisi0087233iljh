<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #ffebee; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .flower { font-size: 50px; margin: 10px; animation: bounce 2s infinite; }
        .message { background: white; padding: 20px; border: 4px solid #ff4081; border-radius: 10px; text-align: center; box-shadow: 10px 10px 0px #ff4081; }
        h1 { color: #ff4081; font-size: 24px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .pixel-art { display: grid; grid-template-columns: repeat(5, 20px); gap: 2px; margin-bottom: 20px; }
        .dot { width: 20px; height: 20px; background-color: #4caf50; }
        .pink { background-color: #ff80ab; }
    </style>
</head>
<body>
    <div class="flower">🌸 🌷 🌸</div>
    <div class="message">
        <h1>Su içme vakti geldi! 💧</h1>
        <p>Günde 1.5 litre içersen 25 puan veririm;)</p>
        <p style="font-size: 12px; color: #888;">ily - eft</p>
    </div>
    <div class="flower">🌸 🌷 🌸</div>
</body>
</html>
