<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder for Babe 🌸💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #ffdae9; /* Soft Pink */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        /* Arka Plan Süslemeleri */
        .background-deco {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .pixel-deco-img {
            position: absolute;
            animation: float 8s infinite ease-in-out;
            image-rendering: pixelated;
            opacity: 0.9;
        }

        /* Stardew Menü Kutusu */
        .stardew-container {
            background-color: #4c7c3d; /* Forest Green */
            border: 6px solid #2d4c24;
            padding: 35px;
            text-align: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 440px;
            position: relative;
        }

        /* Ana İkonlar Area */
        .icon-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .main-pixel-img {
            width: 80px;
            height: 80px;
            image-rendering: pixelated;
        }

        .heart-img {
            animation: heartbeat 1.2s infinite;
            width: 90px;
            height: 90px;
        }

        /* Enerji Barı */
        .energy-bar-container {
            width: 50px; height: 150px;
            background: #222; border: 3px solid #fff;
            position: absolute; right: -65px; bottom: 0;
            display: flex; flex-direction: column-reverse;
        }

        .energy-fill {
            width: 100%;
            background: #4ef064;
            animation: fillEnergy 3s infinite alternate ease-in-out;
        }

        h1 { color: #fff; font-size: 18px; line-height: 1.6; text-shadow: 3px 3px #2d4c24; margin: 10px 0; }
        .pixel-msg { font-size: 11px; color: #d1ffbd; line-height: 2; margin-bottom: 20px; }
        .footer { font-size: 8px; color: #a8d59d; border-top: 2px dashed #a8d59d; padding-top: 15px; margin-top: 10px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes fillEnergy { 0% { height: 10%; background: #ff4d4d; } 100% { height: 100%; background: #4ef064; } }
    </style>
</head>
<body>

    <div class="background-deco" id="deco"></div>

    <div class="stardew-container">
        <div class="energy-bar-container"><div class="energy-fill"></div></div>

        <div class="icon-container">
            <img src="cicek.png" class="main-pixel-img" alt="cicek">
            <img src="kalp.png" class="main-pixel-img heart-img" alt="kalp">
            <img src="kiraz.png" class="main-pixel-img" alt="kiraz">
        </div>

        <h1>BABE SU İÇ!!! ✨🌸</h1>
        
        <div class="pixel-msg">
            GÜNDE 1.5 LİTRE SU<br>
            +25 PUAN ;)
        </div>
        
        <div class="footer">
            LEVEL: 7ish✨
        </div>
    </div>

    <script>
    const deco = document.getElementById('deco');
    // İndirdiğin tüm pikselli resimlerin isimleri burada olmalı
    const backgroundImages = ['isilti.png', 'yildiz.png', 'ari.png', 'cicek.png', 'kiraz.png', 'cilek.png', 'aycicek.png', 'kebelek.png', 'cd.png', 'deniz.png']; 
    
 // EŞİT DAĞILIM AYARLARI
    const rows = 8; // Yatayda 8 sıra
    const cols = 10; // Dikeyde 10 sütun
    
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            
            // Her hücrenin içine rastgele bir noktaya koy ama hücre dışına taşmasın
            // Böylece hem düzenli görünür hem de aşırı robotik durmaz
            const item = document.createElement('img');
            item.className = 'pixel-deco-img';
            item.src = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
            
            // Konum Hesaplama (Izgara Mantığı)
            const left = (c * (100 / cols)) + (Math.random() * 5); 
            const top = (r * (100 / rows)) + (Math.random() * 5);
            
            item.style.left = left + '%';
            item.style.top = top + 'px'; // Sabit px yerine % de kullanabilirsin
            item.style.top = top + '%';

            // BOYUTLARI SABİTLEYELİM (Eşitlik için)
            // Hepsini benzer boyutlara çekiyoruz ki bazıları devasa durmasın
            const sizeValue = Math.floor(Math.random() * 15) + 45; // 45px ile 60px arası
            item.style.width = sizeValue + 'px';
            item.style.height = 'auto';

            // HAREKET
            item.style.animationDelay = Math.random() * 5 + 's';
            item.style.animationDuration = (Math.random() * 3 + 5) + 's';
            
            deco.appendChild(item);
        }
    }
</script>
</body>
</html>
